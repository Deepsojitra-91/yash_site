<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
        }

        .default-profile-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>

<body class="gradient-bg min-h-screen">
    <button id="mobileMenuBtn" class="fixed top-4 left-4 z-50 lg:hidden bg-white p-3 rounded-xl shadow-lg">
        <svg class="w-6 h-6 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 lg:hidden"></div>

    <aside id="sidebar"
        class="fixed top-0 left-0 h-full w-80 bg-white shadow-2xl transform -translate-x-full lg:translate-x-0 transition-all duration-300 z-40 flex flex-col">
        <button id="closeSidebar" class="absolute top-4 right-4 lg:hidden text-slate-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <div class="p-6 border-b bg-gradient-to-r from-slate-50 to-slate-100">
            <div class="flex flex-col items-center">
                <div id="profileImgContainer"
                    class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg">
                    <img id="profileImg" class="w-full h-full object-cover hidden" alt="Profile">
                    <div id="profilePlaceholder" class="w-full h-full default-profile-icon">
                        <span id="profileInitial">U</span>
                    </div>
                </div>
                <h3 id="sidebarUserName" class="text-lg font-bold text-slate-900 mt-3">Loading...</h3>
                <p id="userEmail" class="text-xs text-slate-600">Loading...</p>
                <a href="/profile-details"
                    class="mt-3 bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm">Edit
                    Profile</a>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-3">
            <a href="/dashboard" class="flex items-center px-4 py-3 rounded-xl text-slate-700 hover:bg-slate-100">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10" />
                </svg>
                Dashboard
            </a>

            <a href="/change-password" class="flex items-center px-4 py-3 rounded-xl text-slate-700 hover:bg-slate-100">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16.5 10V7a4.5 4.5 0 10-9 0v3m-.5 3h10a2 2 0 012 2v5a2 2 0 01-2 2h-10a2 2 0 01-2-2v-5a2 2 0 012-2z" />
                </svg>
                Change Password
            </a>

            <a href="/switch-user" class="flex items-center px-4 py-3 rounded-xl text-slate-700 hover:bg-slate-100">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 3h6v6m0-6l-8 8M9 21H3v-6m0 6l8-8" />
                </svg>
                Switch User
            </a>

            <a href="/referal-users"
                class="flex items-center px-4 py-3 rounded-xl bg-emerald-100 text-slate-900 font-medium">
                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 10a3 3 0 11-6 0 3 3 0 016 0zM6 20a6 6 0 0112 0v1H0v-1a6 6 0 016-6z" />
                </svg>
                Referral Users
            </a>

            <a href="/products" class="flex items-center px-4 py-3 rounded-xl text-slate-700 hover:bg-slate-100">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                Products
            </a>

            <a href="/create-account" class="flex items-center px-4 py-3 rounded-xl text-slate-700 hover:bg-slate-100">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Create New Account
            </a>
        </nav>

        <div class="p-4 border-t">
            <a href="#" id="logoutBtn"
                class="bg-red-500 hover:bg-red-600 text-white flex items-center justify-center py-3 rounded-xl font-semibold">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </a>
        </div>
    </aside>

    <main class="lg:ml-80 p-6 md:p-10 text-white min-h-screen">
        <div class="w-full max-w-xl mx-auto">
            <div id="referralList" class="space-y-3 mt-4"></div>

            <p id="noReferralMessage" class="mt-6 text-center text-slate-200 text-sm hidden">
                No referral users found.
            </p>
        </div>

        <div id="referralModal"
            class="fixed inset-0 bg-black bg-opacity-40 z-[9998] hidden items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
                <h4 class="text-xl font-bold text-slate-900 mb-5 text-center">
                    Referral User Details
                </h4>

                <div class="space-y-4 bg-slate-50 p-5 rounded-xl border border-slate-200">
                    <div class="flex justify-between">
                        <span class="font-semibold text-blue-600">ID</span>
                        <span id="refModalIdNumber" class="font-bold text-slate-900"></span>
                    </div>

                    <div class="flex justify-between">
                        <span class="font-semibold text-blue-600">Current Level</span>
                        <span id="refModalCurrentLevel" class="font-bold text-slate-900"></span>
                    </div>

                    <div class="flex justify-between">
                        <span class="font-semibold text-blue-600">Upcoming Level</span>
                        <span id="refModalUpcomingLevel" class="font-bold text-slate-900"></span>
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button id="refModalCloseBtn"
                        class="px-5 py-2 rounded-lg bg-slate-200 text-slate-700 hover:bg-slate-300 font-medium">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </main>

    <a href="https://wa.me/919316123287" target="_blank"
        class="fixed bottom-6 right-6 bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-2xl z-50">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
        </svg>
    </a>

    <div id="toastContainer" class="fixed top-4 right-4 z-[9999] space-y-3 pointer-events-none"></div>

    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-40 z-[9998] items-center justify-center hidden">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-semibold text-slate-900 mb-2">Are you sure?</h3>
            <p id="confirmMessage" class="text-sm text-slate-600 mb-6"></p>
            <div class="flex justify-end gap-3">
                <button id="confirmCancelBtn"
                    class="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm font-medium">Cancel</button>
                <button id="confirmOkBtn"
                    class="px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 text-sm font-semibold">Yes,
                    continue</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user || !user.mobile) {
            showToast("error", "Please login first");
            setTimeout(() => {
                window.location.href = "/login";
            }, 1200);
        }

        document.getElementById("sidebarUserName").textContent = user.full_name || "User";
        document.getElementById("userEmail").textContent = user.email || "No email";

        const img = document.getElementById("profileImg");
        const placeholder = document.getElementById("profilePlaceholder");
        const initial = document.getElementById("profileInitial");

        if (user.profile_pic && user.profile_pic.trim() !== "") {
            img.src = user.profile_pic;
            img.classList.remove("hidden");
            placeholder.classList.add("hidden");
        } else {
            const firstLetter = user.full_name ? user.full_name.charAt(0).toUpperCase() : "U";
            initial.textContent = firstLetter;
        }

        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");

        document.getElementById("mobileMenuBtn").onclick = () => {
            sidebar.classList.remove("-translate-x-full");
            overlay.classList.remove("hidden");
        };

        document.getElementById("closeSidebar").onclick = () => {
            sidebar.classList.add("-translate-x-full");
            overlay.classList.add("hidden");
        };

        overlay.onclick = () => {
            sidebar.classList.add("-translate-x-full");
            overlay.classList.add("hidden");
        };

        document.getElementById("logoutBtn").onclick = async (e) => {
            e.preventDefault();
            const ok = await showConfirm("Are you sure you want to logout?");
            if (!ok) return;
            localStorage.removeItem("user");
            sessionStorage.clear();
            window.location.href = "/";
        };

        function showToast(type, message) {
            const container = document.getElementById("toastContainer");
            if (!container) return;

            let borderClass = "";
            let titleColor = "";
            let icon = "";

            if (type === "success") {
                borderClass = "border-green-400";
                titleColor = "text-green-700";
                icon = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
            } else {
                borderClass = "border-red-400";
                titleColor = "text-red-700";
                icon = `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>`;
            }

            const toast = document.createElement("div");
            toast.className = `toast-animate-in px-4 py-3 bg-white rounded-xl shadow-lg border ${borderClass} flex items-start gap-3`;

            toast.innerHTML = `
                <div>${icon}</div>
                <div class="${titleColor} font-medium">${message}</div>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translateX(20px)";
                toast.style.transition = "0.3s";
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        let confirmResolve = null;

        function showConfirm(message) {
            const modal = document.getElementById("confirmModal");
            const msg = document.getElementById("confirmMessage");
            if (!modal || !msg) return Promise.resolve(false);

            msg.textContent = message;
            modal.classList.remove("hidden");
            modal.classList.add("flex");

            return new Promise(resolve => {
                confirmResolve = resolve;
            });
        }

        document.getElementById("confirmCancelBtn").onclick = () => {
            document.getElementById("confirmModal").classList.add("hidden");
            if (confirmResolve) confirmResolve(false);
        };

        document.getElementById("confirmOkBtn").onclick = () => {
            document.getElementById("confirmModal").classList.add("hidden");
            if (confirmResolve) confirmResolve(true);
        };

        const refIdDisplayEl = document.getElementById("refIdDisplay");
        const referralListEl = document.getElementById("referralList");
        const noReferralMessageEl = document.getElementById("noReferralMessage");

        const referralModal = document.getElementById("referralModal");
        const refModalIdNumber = document.getElementById("refModalIdNumber");
        const refModalCurrentLevel = document.getElementById("refModalCurrentLevel");
        const refModalUpcomingLevel = document.getElementById("refModalUpcomingLevel");
        const refModalCloseBtn = document.getElementById("refModalCloseBtn");

        if (user && user.id_number && refIdDisplayEl) {
            refIdDisplayEl.textContent = user.id_number;
        }

        let selectedReferral = null;

        async function loadReferralUsers() {
            try {
                const res = await fetch(`/api/accounts/by-referral?ref_id=${encodeURIComponent(user.id_number || "")}`);
                const data = await res.json();

                if (!res.ok) {
                    showToast("error", data.detail || "Failed to load referral users");
                    return;
                }

                const accounts = data.accounts || [];
                if (accounts.length === 0) {
                    noReferralMessageEl.classList.remove("hidden");
                    return;
                }

                referralListEl.innerHTML = "";
                noReferralMessageEl.classList.add("hidden");

                accounts.forEach(acc => {
                    const row = document.createElement("button");
                    row.type = "button";
                    row.className = "w-full px-4 py-3 rounded-lg bg-white border-2 border-emerald-500 text-slate-900 font-semibold shadow-sm hover:shadow-md transition";

                    row.innerHTML = `<span class="font-semibold text-slate-800">${acc.id_number || "Not Assigned"}</span>`;

                    row.onclick = () => openReferralModal(acc);
                    referralListEl.appendChild(row);
                });
            } catch (err) {
                console.error("loadReferralUsers error:", err);
                showToast("error", "Something went wrong while loading referral users");
            }
        }

        function openReferralModal(acc) {
            selectedReferral = acc;
            refModalIdNumber.textContent = acc.id_number || "Not Assigned";
            refModalCurrentLevel.textContent = acc.current_level || "-";
            refModalUpcomingLevel.textContent = acc.upcoming_level || "-";

            referralModal.classList.remove("hidden");
            referralModal.classList.add("flex");
        }

        function closeReferralModal() {
            referralModal.classList.add("hidden");
            referralModal.classList.remove("flex");
            selectedReferral = null;
        }

        refModalCloseBtn.onclick = () => closeReferralModal();

        loadReferralUsers();
    </script>
</body>

</html>
