<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <link rel="shortcut icon" href="/static/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        @keyframes toast-slide-in {
            from {
                opacity: 0;
                transform: translateX(16px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-animate-in {
            animation: toast-slide-in 0.25s ease-out;
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
        <div class="flex justify-center mb-6">
            <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-6 py-2 rounded-full shadow-lg">
                <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                <span class="font-bold">ADMIN ACCESS</span>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-slate-900 mb-2 text-center">Admin Panel</h2>
        <p class="text-slate-600 mb-8 text-center">Secure login for administrators</p>

        <div id="errorBox" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded">
            <div class="flex">
                <svg class="h-5 w-5 text-red-500 mr-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                        clip-rule="evenodd" />
                </svg>
                <p class="text-sm text-red-700 font-medium" id="errorText"></p>
            </div>
        </div>

        <form id="adminLoginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-800 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" id="username" required
                        class="w-full pl-10 pr-4 py-3 border-2 border-slate-200 rounded-lg focus:border-purple-500 outline-none"
                        placeholder="Enter admin username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-800 mb-2">Password</label>
                <div class="relative">
                    <!-- Left lock icon (same as before) -->
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>

                    <!-- Password input (notice pr-10 for space for eye button) -->
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-10 py-3 border-2 border-slate-200 rounded-lg focus:border-purple-500 outline-none"
                        placeholder="Enter admin password">

                    <!-- Eye toggle button -->
                    <button type="button" id="toggleAdminPassword"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500">
                        <svg id="adminEyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <!-- Default eye icon -->
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 
                       9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-semibold py-3 rounded-lg shadow-lg transition-all">
                Sign In to Admin Panel
            </button>
        </form>

        <p class="text-center text-slate-500 mt-6 text-sm">
            <a href="/" class="text-purple-600 hover:text-purple-700 font-semibold">Back to Home</a>
        </p>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const btn = document.getElementById('submitBtn');

            errorBox.classList.add('hidden');
            btn.innerHTML = 'Verifying...';
            btn.disabled = true;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('admin', JSON.stringify({
                        username: data.username,
                        role: 'admin',
                        loginTime: new Date().toISOString()
                    }));

                    window.location.href = '/admin-dashboard';
                } else {
                    errorText.textContent = data.detail || 'Invalid credentials';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorText.textContent = "Connection error. Please try again.";
                errorBox.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Sign In to Admin Panel';
                btn.disabled = false;
            }
        });

        const adminPasswordField = document.getElementById("password");
        const adminToggleBtn = document.getElementById("toggleAdminPassword");
        const adminEyeIcon = document.getElementById("adminEyeIcon");

        adminToggleBtn.addEventListener("click", function () {
            if (adminPasswordField.type === "password") {
                adminPasswordField.type = "text";

                // change to eye-off icon
                adminEyeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                         a10.06 10.06 0 013.143-4.734M9.88 9.88a3 3 0 104.24 4.24" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 3l18 18" />
            `;
            } else {
                adminPasswordField.type = "password";

                // change back to eye icon
                adminEyeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 
                         9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            `;
            }
        });
    </script>
</body>

</html>
